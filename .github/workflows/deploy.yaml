name: Deploy Postcode Processor

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm"
          native-image-job-reports: "true"

      - name: Build native image
        run: mvn -Pnative package -DskipTests

      - name: List target directory
        run: ls -la target/

      - name: Package Lambda zip
        run: |
          cp target/aus_post_codes_data_aws_serverless bootstrap
          zip target/postcode-distance.zip bootstrap
          rm bootstrap
          echo "Zip contents:"
          unzip -l target/postcode-distance.zip

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init & apply
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=postcode-distance/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve \
            -var="github_oidc_provider_arn=${{ secrets.AWS_OIDC_PROVIDER_ARN }}" \
            -var="github_org=${{ vars.ORG }}" \
            -var="github_repo=${{ vars.REPO }}"

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name postcode-distance-processor \
            --zip-file fileb://target/postcode-distance.zip

          aws lambda update-function-code \
            --function-name postcode-distance-query \
            --zip-file fileb://target/postcode-distance.zip
